<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vietlott AI Pro</title>

    <link rel="icon" type="image/png" href="512x512.4e180c153854dd3721553b2b21d12a05.ai.1.png">
    <link rel="apple-touch-icon" href="512x512.4e180c153854dd3721553b2b21d12a05.ai.1.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-light: linear-gradient(135deg,#fdfbfb,#ebedee);
            --bg-dark: linear-gradient(135deg,#141e30,#243b55);
            --card-light: #ffffff;
            --card-dark: #1f2937;
            --primary: #ff9900;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        body.light { background: var(--bg-light); color: #333; }

        /* Splash Screen */
        #splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #141e30;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.8s;
        }

        /* Bố cục chính */
        .app-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        /* Phần đầu: Header & Logo */
        header { text-align: center; padding: 10px 0; }
        .logo-img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 5px; border-radius: 12px; }

        /* Phần giữa: KẾT QUẢ QUAY SỐ (Trọng tâm) */
        .result-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 250px;
        }

        /* Phần dưới: ĐIỀU KHIỂN & NÚT BẤM */
        footer {
            padding-bottom: 30px;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 15px;
        }
        
        button {
            padding: 12px 5px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg,#ffcc00,#ff9900);
            color: black;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.9); }
        .btn-ai {
            grid-column: span 4;
            padding: 15px;
            font-size: 14px;
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            color: white;
            margin-bottom: 5px;
        }

        /* Hiển thị bóng số */
        .number-ball {
            display: inline-block;
            width: 45px;
            height: 45px;
            line-height: 45px;
            border-radius: 50%;
            background: gold;
            color: black;
            font-weight: bold;
            margin: 5px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes pop { from{transform:scale(0);} to{transform:scale(1);} }

        /* Jackpot Meter */
        #meter-container {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: none;
        }
        .meter-bar { height: 8px; background: #444; border-radius: 10px; overflow: hidden; margin: 8px 0; }
        #meter-fill { height: 100%; width: 0%; background: linear-gradient(to right, #4caf50, #ffeb3b, #f44336); transition: 1s; }

        .scan { font-weight: bold; color: #ff9900; animation: blink 0.5s infinite alternate; }
        @keyframes blink { from{opacity:0.4;} to{opacity:1;} }
        
        .status-bar { font-size: 10px; opacity: 0.6; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="splash">
    <img src="512x512.4e180c153854dd3721553b2b21d12a05.ai.1.png" class="logo-img" alt="Logo">
    <p style="font-weight:600; font-size: 14px;">AI ĐANG KẾT NỐI SERVER...</p>
</div>

<div class="app-wrapper">
    <header>
        <div class="status-bar" id="live-clock">Đang đồng bộ...</div>
        <img src="512x512.4e180c153854dd3721553b2b21d12a05.ai.1.png" class="logo-img" alt="Vietlott AI Logo">
        <div style="font-size: 12px; font-weight: bold; color: gold;">PHẦN MỀM AI PRO CHÍNH XÁC CAO</div>
        <div style="margin-top: 10px;">
            <button onclick="toggleDark()" style="background: #444; color: white; padding: 5px 10px;">🌓 Giao diện</button>
            <button onclick="toggleSound()" style="background: #444; color: white; padding: 5px 10px;">🔊 Âm thanh</button>
        </div>
    </header>

    <main class="result-section">
        <div id="scanArea"></div>
        <div id="result">
            <p style="opacity: 0.5;">Chọn một loại trò chơi phía dưới để AI bắt đầu dự đoán</p>
        </div>
        
        <div id="meter-container">
            <div id="meter-text" style="font-size: 11px;">Độ chín Jackpot: 0%</div>
            <div class="meter-bar"><div id="meter-fill"></div></div>
            <div id="ai-advice" style="font-size: 10px; font-style: italic;"></div>
        </div>
    </main>

    <footer>
        <div class="grid-buttons">
            <button class="btn-ai" onclick="gen('jackpot')">🤖 DỰ ĐOÁN SIÊU JACKPOT AI</button>
            <button onclick="gen('mega')">Mega</button>
            <button onclick="gen('power')">Power</button>
            <button onclick="gen('keno')">Keno</button>
            <button onclick="gen('lotto')">Lotto</button>
            <button onclick="gen('max3d')">3D</button>
            <button onclick="gen('max3dplus')">3D+</button>
            <button onclick="gen('max3dpro')">3D Pro</button>
            <button onclick="gen('bingo')">Bingo</button>
        </div>
    </footer>
</div>

<script>
let audioCtx;
let soundEnabled = true;

function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playSound(freq, duration) {
    if(!soundEnabled) return;
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

// Hiệu ứng pháo hoa nhỏ
function triggerFirework() {
    confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 },
        colors: ['#ff9900', '#ffffff', '#ffd700']
    });
}

// Giữ nguyên đồng hồ
setInterval(() => {
    document.getElementById('live-clock').innerText = "LIVE: " + new Date().toLocaleString('vi-VN');
}, 1000);

window.onload = () => {
    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
    }, 1500);
};

function toggleDark() { document.body.classList.toggle("light"); }
function toggleSound() { soundEnabled = !soundEnabled; }

// THUẬT TOÁN AI GIỮ NGUYÊN
function getSmartNumbers(count, max, targetSum, range) {
    let attempts = 0;
    while(attempts < 500) {
        let nums = [];
        while(nums.length < count) {
            let n = Math.floor(Math.random() * max) + 1;
            if(!nums.includes(n)) nums.push(n);
        }
        let sum = nums.reduce((a, b) => a + b, 0);
        if(sum >= (targetSum - range) && sum <= (targetSum + range)) return nums.sort((a,b)=>a-b);
        attempts++;
    }
    return Array.from({length: count}, () => Math.floor(Math.random() * max) + 1).sort((a,b)=>a-b);
}

function gen(game) {
    const scanArea = document.getElementById('scanArea');
    const resultDiv = document.getElementById('result');
    const meter = document.getElementById('meter-container');
    
    resultDiv.innerHTML = "";
    meter.style.display = 'none';
    scanArea.innerHTML = "<div class='scan'>AI ĐANG QUÉT DỮ LIỆU...</div>";
    
    playSound(400, 0.1);
    if(navigator.vibrate) navigator.vibrate(50);

    setTimeout(() => {
        scanArea.innerHTML = "";
        let finalNums = [];
        let label = game.toUpperCase();

        if(game === 'mega') finalNums = getSmartNumbers(6, 45, 150, 30);
        else if(game === 'power') finalNums = getSmartNumbers(6, 55, 180, 40);
        else if(game === 'jackpot') { label="Siêu Jackpot"; finalNums = getSmartNumbers(6, 55, 175, 25); }
        else if(game === 'keno') finalNums = Array.from({length: 10}, () => Math.floor(Math.random()*80)+1).sort((a,b)=>a-b);
        else if(game === 'lotto') finalNums = getSmartNumbers(5, 35, 90, 20);
        else if(game === 'max3d') finalNums = [Math.floor(Math.random()*1000).toString().padStart(3,'0')];
        else if(game === 'max3dpro') finalNums = [Math.floor(Math.random()*1000).toString().padStart(3,'0'), Math.floor(Math.random()*1000).toString().padStart(3,'0')];
        else if(game === 'bingo') finalNums = Array.from({length: 3}, () => Math.floor(Math.random()*6)+1);
        else finalNums = [Math.floor(Math.random()*1000).toString().padStart(3,'0')];

        let html = `<h2 style="color:gold; margin:0 0 10px 0;">${label}</h2>`;
        finalNums.forEach(n => {
            html += `<div class="number-ball">${n}</div>`;
        });
        resultDiv.innerHTML = html;
        
        // Hiệu ứng pháo hoa khi có kết quả
        triggerFirework();
        playSound(800, 0.2);

        // Hiển thị Meter cho các dòng Jackpot
        if(['mega','power','jackpot'].includes(game)) {
            meter.style.display = 'block';
            let p = Math.floor(Math.random()*30) + 70;
            document.getElementById('meter-fill').style.width = p + "%";
            document.getElementById('meter-text').innerText = "Độ chín Jackpot: " + p + "%";
            document.getElementById('ai-advice').innerText = p > 85 ? "🔥 TÍN HIỆU CỰC ĐẸP - NÊN VÀO TIỀN" : "⭐ TÍN HIỆU KHÁ - CÓ THỂ THỬ VẬN MAY";
        }
    }, 1200);
}
</script>
</body>
</html>
