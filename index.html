<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vietlott AI Pro - Red Edition</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --vietlott-red: #ed1c24;
            --vietlott-dark: #be1117;
            --glass: rgba(255, 255, 255, 0.1);
            --shadow-3d: 0 8px 0 #9c0d12, 0 15px 20px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #ed1c24 0%, #7b0a0e 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Splash Screen */
        #splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ed1c24;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.8s;
        }

        .app-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            padding: 15px;
        }

        /* Status Bar & LED */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            font-size: 11px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }
        .led-group { display: flex; align-items: center; gap: 5px; }
        .led {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #444;
            box-shadow: 0 0 2px #000;
        }
        .led-active {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0.4; } }

        header { text-align: center; padding: 15px 0; }
        .logo-img { 
            width: 65px; height: 65px; 
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            border-radius: 15px;
        }

        /* Result Area */
        .result-container {
            flex: 1;
            background: rgba(0,0,0,0.15);
            border-radius: 25px;
            margin: 10px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
            position: relative;
        }

        .number-ball {
            display: inline-flex;
            width: 46px; height: 46px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #ffd700 40%, #cc9900);
            color: #000;
            font-weight: 700;
            border-radius: 50%;
            justify-content: center; align-items: center;
            margin: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4), inset -2px -2px 5px rgba(0,0,0,0.2);
            font-size: 18px;
            animation: bounceIn 0.5s cubic-bezier(0.36, 0, 0.66, -0.56) forwards;
        }
        @keyframes bounceIn { from { transform: scale(0) rotate(-180deg); } to { transform: scale(1) rotate(0); } }

        /* Buttons Grid */
        .grid-ctrl {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding-bottom: 20px;
        }

        .btn-3d {
            background: var(--vietlott-red);
            border: none;
            border-radius: 15px;
            padding: 12px 5px;
            color: white;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            box-shadow: var(--shadow-3d);
            transition: 0.1s;
            position: relative;
            top: 0;
        }
        .btn-3d:active {
            top: 4px;
            box-shadow: 0 4px 0 #9c0d12;
        }

        .btn-jackpot {
            grid-column: span 4;
            background: linear-gradient(135deg, #ffcc00 0%, #ff9500 100%);
            color: #7b0a0e;
            font-size: 15px;
            margin-bottom: 8px;
            text-shadow: 0 1px 1px rgba(255,255,255,0.3);
            box-shadow: 0 8px 0 #cc7a00, 0 15px 20px rgba(0,0,0,0.3);
        }
        .btn-jackpot:active { box-shadow: 0 4px 0 #cc7a00; }

        .btn-birth {
            grid-column: span 4;
            background: #222;
            box-shadow: 0 8px 0 #000;
        }

        /* Jackpot Meter */
        #meter-box {
            width: 85%;
            margin-top: 15px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            display: none;
        }
        .bar-bg { height: 10px; background: #444; border-radius: 10px; overflow: hidden; margin: 8px 0; }
        #bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4caf50, #ffeb3b, #f44336); transition: 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* Modal / Pop-up */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            z-index: 10000;
            justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: white; color: #333;
            width: 90%; max-width: 350px;
            padding: 25px; border-radius: 25px;
            text-align: center;
        }
        select {
            padding: 10px; margin: 5px; border-radius: 10px;
            border: 2px solid #eee; font-family: inherit;
        }
        
        .scan-txt { font-weight: bold; color: #ffcc00; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="splash">
    <img src="icon.png" class="logo-img" alt="Vietlott">
    <div style="margin-top:20px; width:40px; height:40px; border:4px solid #fff; border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite;"></div>
    <p style="margin-top:15px; letter-spacing:1px; font-weight:600;">AI PRO ĐANG KẾT NỐI...</p>
</div>

<div class="app-wrapper">
    <div class="top-bar">
        <div id="clock">00:00:00</div>
        <div class="led-group">
            <span style="font-size:9px">VIETLOTT SERVER:</span>
            <div id="statusLed" class="led"></div>
        </div>
    </div>

    <header>
        <img src="icon.png" class="logo-img">
        <div style="font-weight:700; font-size:18px; color:white; margin-top:5px;">VIETLOTT AI PRO</div>
        <div style="font-size:10px; opacity:0.8;">HỆ THỐNG DỰ ĐOÁN XÁC SUẤT CAO</div>
    </header>

    <main class="result-container">
        <div id="scanMsg"></div>
        <div id="resultDisplay">
            <p style="opacity:0.4; font-size:13px;">Sẵn sàng phân tích bộ số...</p>
        </div>
        
        <div id="meter-box">
            <div id="meter-label" style="font-size:11px; font-weight:600;">Độ chín Jackpot: 0%</div>
            <div class="bar-bg"><div id="bar-fill"></div></div>
            <div id="ai-tip" style="font-size:10px; color:#ffcc00;"></div>
        </div>
    </main>

    <footer class="grid-ctrl">
        <button class="btn-3d btn-jackpot" onclick="handleGen('jackpot')">🔥 DỰ ĐOÁN SIÊU JACKPOT AI</button>
        <button class="btn-3d btn-birth" onclick="openBirthModal()">🎂 AI THEO NGÀY SINH</button>
        
        <button class="btn-3d" onclick="handleGen('mega')">Mega</button>
        <button class="btn-3d" onclick="handleGen('power')">Power</button>
        <button class="btn-3d" onclick="handleGen('keno')">Keno</button>
        <button class="btn-3d" onclick="handleGen('lotto')">Lotto</button>
        <button class="btn-3d" onclick="handleGen('max3d')">3D</button>
        <button class="btn-3d" onclick="handleGen('max3dplus')">3D+</button>
        <button class="btn-3d" onclick="handleGen('max3dpro')">3D Pro</button>
        <button class="btn-3d" onclick="handleGen('bingo')">Bingo</button>
    </footer>
</div>

<div id="birthModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0">Dự đoán theo Ngày Sinh</h3>
        <p style="font-size:12px; color:#666;">AI sẽ phân tích bát tự và ngày sinh để tìm bộ số may mắn.</p>
        <div>
            <select id="bDay"></select>
            <select id="bMonth"></select>
            <select id="bYear"></select>
        </div>
        <br>
        <button class="btn-3d" style="width:100%; padding:15px; font-size:14px;" onclick="genBirthAI()">XÁC NHẬN DỰ ĐOÁN</button>
        <p onclick="closeBirthModal()" style="margin-top:15px; font-size:12px; cursor:pointer; color:#999;">Đóng</p>
    </div>
</div>

<script>
let audioCtx;
let soundEnabled = true;

// Khởi tạo Select cho Modal
const bD = document.getElementById('bDay'), bM = document.getElementById('bMonth'), bY = document.getElementById('bYear');
for(let i=1;i<=31;i++) bD.innerHTML+=`<option value="${i}">${i}</option>`;
for(let i=1;i<=12;i++) bM.innerHTML+=`<option value="${i}">${i}</option>`;
for(let i=1950;i<=2026;i++) bY.innerHTML+=`<option value="${i}">${i==1995?'1995':i}</option>`;

function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playSound(f, d) {
    if(!soundEnabled) return; initAudio();
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.frequency.value = f; o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime+d);
}

function openBirthModal() { document.getElementById('birthModal').style.display='flex'; playSound(600,0.1); }
function closeBirthModal() { document.getElementById('birthModal').style.display='none'; }

// Đồng hồ & LED
setInterval(() => {
    const n = new Date();
    document.getElementById('clock').innerText = n.toLocaleTimeString('vi-VN');
    // Giả lập kết nối
    if(n.getSeconds() % 2 === 0) document.getElementById('statusLed').classList.add('led-active');
    else document.getElementById('statusLed').classList.remove('led-active');
}, 1000);

window.onload = () => {
    setTimeout(() => {
        document.getElementById('splash').style.opacity='0';
        setTimeout(()=> document.getElementById('splash').style.display='none', 800);
    }, 1500);
};

// LOGIC AI NÂNG CAO
function getSmartNumbers(count, max, targetSum, range) {
    let attempts = 0;
    while(attempts < 1000) {
        let nums = [];
        while(nums.length < count) {
            let n = Math.floor(Math.random() * max) + 1;
            if(!nums.includes(n)) nums.push(n);
        }
        let sum = nums.reduce((a, b) => a + b, 0);
        let odd = nums.filter(x => x%2!==0).length;
        if(sum >= (targetSum - range) && sum <= (targetSum + range) && odd >= 2 && odd <= 4) 
            return nums.sort((a,b)=>a-b);
        attempts++;
    }
    return Array.from({length:count},()=>Math.floor(Math.random()*max)+1).sort((a,b)=>a-b);
}

function handleGen(type) {
    const msg = document.getElementById('scanMsg');
    const display = document.getElementById('resultDisplay');
    const meter = document.getElementById('meter-box');
    
    display.innerHTML = ""; meter.style.display='none';
    msg.innerHTML = "<div class='scan-txt'>🤖 AI ĐANG KẾT NỐI SERVER & PHÂN TÍCH...</div>";
    
    playSound(400, 0.05);
    if(navigator.vibrate) navigator.vibrate(40);

    setTimeout(() => {
        msg.innerHTML = "";
        let res = [];
        let title = type.toUpperCase();

        if(type==='mega') res = getSmartNumbers(6,45,150,30);
        else if(type==='power') res = getSmartNumbers(6,55,180,40);
        else if(type==='jackpot') { title="SIÊU JACKPOT AI"; res = getSmartNumbers(6,55,170,25); }
        else if(type==='keno') res = Array.from({length:10},()=>Math.floor(Math.random()*80)+1).sort((a,b)=>a-b);
        else if(type==='lotto') res = getSmartNumbers(5,35,90,20);
        else if(type==='max3d') res = [Math.floor(Math.random()*1000).toString().padStart(3,'0')];
        else if(type==='max3dplus') res = [Math.floor(Math.random()*1000).toString().padStart(3,'0'), Math.floor(Math.random()*1000).toString().padStart(3,'0')];
        else if(type==='max3dpro') res = [Math.floor(Math.random()*1000).toString().padStart(3,'0'), Math.floor(Math.random()*1000).toString().padStart(3,'0')];
        else res = [Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1];

        let h = `<div style="font-weight:700; color:#ffcc00; margin-bottom:15px; font-size:20px;">${title}</div><div>`;
        res.forEach(n => h += `<div class="number-ball">${n}</div>`);
        display.innerHTML = h + `</div>`;
        
        confetti({ particleCount: 80, spread: 60, origin: { y: 0.5 }, colors:['#ed1c24','#ffffff','#ffd700'] });
        playSound(800, 0.2);

        if(['mega','power','jackpot'].includes(type)) {
            meter.style.display='block';
            let p = Math.floor(Math.random()*35)+65;
            setTimeout(() => {
                document.getElementById('bar-fill').style.width = p+'%';
                document.getElementById('meter-label').innerText = "Độ chín Jackpot: " + p + "%";
                document.getElementById('ai-tip').innerText = p > 85 ? "🔥 TÍN HIỆU CỰC MẠNH - NÊN VÀO TIỀN" : "⭐ TÍN HIỆU TỐT - CÓ THỂ ĐẦU TƯ";
            }, 100);
        }
    }, 1200);
}

function genBirthAI() {
    closeBirthModal();
    const seed = parseInt(bD.value) + parseInt(bM.value) + parseInt(bY.value);
    const msg = document.getElementById('scanMsg');
    const display = document.getElementById('resultDisplay');
    
    display.innerHTML = "";
    msg.innerHTML = "<div class='scan-txt'>🔮 ĐANG GIẢI MÃ VẬN MỆNH THEO NGÀY SINH...</div>";
    
    setTimeout(() => {
        msg.innerHTML = "";
        let nums = [];
        for(let i=0; i<6; i++) {
            let n = ((seed * (i + 7)) % 55) + 1;
            while(nums.includes(n)) n = (n % 55) + 1;
            nums.push(n);
        }
        nums.sort((a,b)=>a-b);
        let h = `<div style="font-weight:700; color:#ffcc00; margin-bottom:15px; font-size:16px;">MAY MẮN CỦA BẠN</div><div>`;
        nums.forEach(n => h += `<div class="number-ball">${n}</div>`);
        display.innerHTML = h + `</div>`;
        confetti({ particleCount: 150, spread: 100, origin: { y: 0.5 } });
        playSound(900, 0.3);
    }, 1500);
}

function spin() { /* animation spin defined in CSS */ }
</script>
</body>
</html>
